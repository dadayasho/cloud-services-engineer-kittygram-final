name: Deploy
on:

  repository_dispatch:
    types: [deploy]


jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Update pip
      run: python3 -m pip install --upgrade pip

    - name: Install dependencies
      run: |
           cd backend && pip install -r requirements.txt
           
    - name: Install pep8  
      run: pip install pycodestyle

    - name: Run pep8
      run: |
           cd backend && pycodestyle --max-line-length=120 .
      continue-on-error: true

  
  push_to_registry:
    name: Push Docker image to Docker Hub
    needs: testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin  

      - name: Build and push backend image
        run: |
            cd backend
            docker build . -t tonysoprano228/kittygram_backend
            docker push tonysoprano228/kittygram_backend

      - name: Build and push frontend image
        run: |
            cd frontend
            docker build . -t tonysoprano228/kittygram_frontend
            docker push tonysoprano228/kittygram_frontend

      - name: Build and push nginx image
        run: |
            cd nginx
            docker build . -t tonysoprano228/kittygram_gateway
            docker push tonysoprano228/kittygram_gateway
            
 
  deploy_to_server:
    runs-on: ubuntu-latest
    needs: 
      # Дождёмся билда всех фронтенда, бэкенда и гейтвея:
      - push_to_registry
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      
      - name: Get VM IP from Terraform
        run: |
          echo "HOST_IP=${{ github.event.client_payload.vm_ip }}" >> $GITHUB_ENV
          echo "SHA: ${{ github.event.client_payload.sha }}"
          echo "Ref: ${{ github.event.client_payload.ref }}"
      
      # Копируем docker-compose.production.yml на продакшен-сервер:
      - name: Copy docker-compose.yml via ssh
        uses: appleboy/scp-action@master
      # Передаём параметры для action appleboy/scp-action:
        with:
          host: ${{ env.HOST_IP}}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "kittygram"

      - name: Add .env to deploy_to_server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.HOST_IP}}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd kittygram

            cat > .env << EOF
            POSTGRES_DB=kittygram
            POSTGRES_USER= ${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD= ${{ secrets.POSTGRES_PASSWORD }}
            DB_NAME=kittygram
            DB_HOST=postgres
            DB_PORT=5432
            SECRET_KEY = ${{ secrets.DJANGO_SECRET_KEY }}
            DEBUG = True
            ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0, ${{ env.HOST_IP}}
            EOF

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.HOST_IP}}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd kittygram
            
            sudo docker compose -f docker-compose.production.yml pull
          
            sudo docker compose -f docker-compose.production.yml down
            sudo docker compose -f docker-compose.production.yml up -d
            
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py migrate
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py collectstatic
            sudo docker compose -f docker-compose.production.yml exec backend cp -r /app/collected_static/. /backend_static/static/
  tests:
    runs-on: ubuntu-latest
    needs:
      - deploy_to_server
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Install pytest
        run: pip install pytest

      - name: Replace IP in tests.yml
        run: sed -i "s|{HOST_IP}|${{ env.HOST_IP }}|g" tests.yml
      - name: Run tests
        run:  cd backend && pytest ../tests

  telegram_notification:
    name: telegram_notification
    runs-on: ubuntu-latest
    needs:
      - deploy_to_server
      - tests
    steps:
      - name: Send telegram message on push
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ github.actor }} created commit:
            Commit message: ${{ github.event.commits[0].message }}
            
            Repository: ${{ github.repository }}
            
            See changes: https://github.com/${{ github.repository }}/commit/${{github.sha}}
